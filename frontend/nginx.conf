server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — cache aggressively (vite emits hashed filenames).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for any unmatched route so client-side
    # routing (react-router) handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* and /health to the backend container. The backend service
    # name `backend` resolves via docker compose's bridge network DNS.
    location /api/ {
        proxy_pass http://backend:9527;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Some endpoints stream audio/video — disable buffering and bump timeouts.
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 512m;
    }

    location = /health {
        proxy_pass http://backend:9527/health;
        access_log off;
    }
}
